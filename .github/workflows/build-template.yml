name: Reusable Build Workflow

on:
  workflow_call:
    inputs:
      upload-artifact:
        description: Upload the built solution package.
        required: true
        type: boolean

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Restore NuGet packages for Solution
        run: dotnet restore OptionsetsSolution/OptionsetsSolution.cdsproj

      - name: Build Solution Package
        run: dotnet build OptionsetsSolution/OptionsetsSolution.cdsproj -c Release --no-restore

      - name: Upload build artifacts
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: OptionsetsSolution
          path: OptionsetsSolution/bin/Release/*.zip